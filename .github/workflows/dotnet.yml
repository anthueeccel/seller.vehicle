name: build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies - ms-vehicle
      run: |
        dotnet restore ms-vehicle/seller.csproj
        
    - name: Build
      run: |
        dotnet build ms-vehicle/seller.csproj --configuration Release --no-restore
        
    - name: Restore dependencies - mvc-client
      run: |
        dotnet restore mvc-client/mvc-client.csproj

    - name: Build - mvc-client
      run: |
        dotnet build mvc-client/mvc-client.csproj --configuration Release --no-restore        